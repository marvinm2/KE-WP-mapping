[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage gate lowered from 45 → 40 in v1.5 (Phase 33, CLEAN-05).
# Real coverage is ~42.18% post-v1.5; the 40 floor gives ~2pp headroom
# so a single under-covered plan doesn't break CI. A coverage-push
# phase will revisit. See CHANGELOG.md entry for full rationale.
addopts =
    --verbose
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=40
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
