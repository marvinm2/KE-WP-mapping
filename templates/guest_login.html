<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/MolAOPlogo.png') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Login - Molecular AOP Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <meta name="csrf-token" content="{{ csrf_token() }}">
</head>
<body>
<div class="page-container">
    {% include 'components/navigation.html' %}
    <div class="guest-login-container">
        <h2>Workshop Login</h2>
        <p>Enter the access code provided by your workshop organizer to submit mappings.</p>

        {% if error %}
            <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.guest_login_submit') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <input type="text" name="code" placeholder="Enter access code" required autofocus autocomplete="off">
            <button type="submit">Login</button>
        </form>

        <div class="alt-login">
            Have a GitHub account? <a href="{{ url_for('auth.login_provider', provider='github') }}">Login with GitHub</a>
        </div>
    </div>

    {% include 'components/footer.html' %}
</div>
</body>
</html>
