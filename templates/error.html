<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/MolAOPlogo.png') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Molecular AOP Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<div class="page-container">
    {% include 'components/navigation.html' %}

    <div class="error-page-container">
        <div class="error-page-icon">&#9888;</div>
        <div class="error-page-message">
            {{ error or "An unexpected error occurred. Please try again." }}
        </div>
        <div class="error-page-actions">
            <button class="btn-link-blue" onclick="location.reload()" style="border: none; cursor: pointer;">Refresh Page</button>
            <a href="/" class="btn-link-dark">Return Home</a>
        </div>
    </div>

    {% include 'components/footer.html' %}
</div>

</html>
